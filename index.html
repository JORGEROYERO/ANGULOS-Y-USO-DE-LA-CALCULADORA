function Triangulo({ orient = "A", adj, op, hip, angleLabel = "θ" }) {
  const cfgs = {
    A: {
      pts: "40,170 230,170 230,50",
      sq: <rect x="212" y="152" width="18" height="18" fill="none" stroke={C.ink} strokeWidth="1.5" />,
      arc: <path d="M 70,170 A 30,30 0 0 0 58,144" fill="none" stroke={C.amber} strokeWidth="1.5" />,
      theta: [72, 152],
      adjPos: [135, 192],
      opPos: [253, 110],
      hipPos: [102, 90],
    },
    B: {
      pts: "230,170 40,170 40,50",
      sq: <rect x="40" y="152" width="18" height="18" fill="none" stroke={C.ink} strokeWidth="1.5" />,
      arc: <path d="M 200,170 A 30,30 0 0 1 212,144" fill="none" stroke={C.amber} strokeWidth="1.5" />,
      theta: [184, 152],
      adjPos: [135, 192],
      opPos: [16, 110],
      hipPos: [168, 90],
    },
    C: {
      pts: "40,170 40,50 230,50",
      sq: <rect x="40" y="50" width="18" height="18" fill="none" stroke={C.ink} strokeWidth="1.5" />,
      arc: <path d="M 40,140 A 30,30 0 0 1 66,164" fill="none" stroke={C.amber} strokeWidth="1.5" />,
      theta: [54, 138],
      adjPos: [12, 110],
      opPos: [135, 34],
      hipPos: [160, 124],
    },
  };
  const cfg = cfgs[orient];
  return (
    <svg viewBox="0 0 280 210" width="100%" style={{ maxWidth: 300 }}>
      <polygon points={cfg.pts} fill="none" stroke={C.ink} strokeWidth="2" />
      {cfg.sq}
      {cfg.arc}
      <text x={cfg.theta[0]} y={cfg.theta[1]} fontSize="13" fill={C.amber} fontWeight="700">{angleLabel}</text>
      <text x={cfg.adjPos[0]} y={cfg.adjPos[1]} fontSize="14" textAnchor="middle" fill={C.inkSoft} fontWeight="700">{adj}</text>
      <text x={cfg.opPos[0]} y={cfg.opPos[1]} fontSize="14" textAnchor="middle" fill={C.inkSoft} fontWeight="700">{op}</text>
      <text x={cfg.hipPos[0]} y={cfg.hipPos[1]} fontSize="14" textAnchor="middle" fill={C.inkSoft} fontWeight="700">{hip}</text>
    </svg>
  );
}

  { n: 9, hip: "25", op: "15", adj: "20", tipo: "sin", ladoUsadoLabel: "opuesto", valorUsado: "15",
    pasos: [
      { enunciado: "Mira el triángulo. ¿Cuáles dos lados ya tienen número (los conocemos)?",
        opciones: ["El opuesto y el adyacente (los dos catetos, sin la hipotenusa)", "La hipotenusa y el opuesto (el lado de enfrente)", "La hipotenusa y el adyacente (el lado pegado al ángulo)"], correcta: 1,
        explicacion: "Para hallar θ usamos la hipotenusa (25) y el opuesto (15), porque son los dos lados que conocemos en este triángulo." },
      { enunciado: "¿Qué botón de la calculadora usamos para hallar el ángulo?",
        opciones: ["cos⁻¹ (se usa cuando ya sabemos el adyacente y la hipotenusa)", "tan⁻¹ (se usa cuando ya sabemos el opuesto y el adyacente)", "sin⁻¹ (se usa cuando ya sabemos el opuesto y la hipotenusa)"], correcta: 2,
        explicacion: "Como conocemos la hipotenusa y el opuesto, la razón que relaciona esos dos lados es el seno, así que usamos su inversa: sin⁻¹." },
      { enunciado: "¿Cuánto mide el ángulo θ?",
        formula: ["La razón seno relaciona el opuesto con la hipotenusa: sin θ = opuesto ÷ hipotenusa.", "Para hallar el ángulo, aplicamos la función inversa: θ = sin⁻¹(opuesto ÷ hipotenusa).", "Con opuesto = 15 e hipotenusa = 25: θ = sin⁻¹(15 ÷ 25) = sin⁻¹(0.6) ≈"],
        opciones: ["37°", "30°", "53°"], correcta: 0,
        explicacion: "θ = sin⁻¹(15÷25) = sin⁻¹(0.6) ≈ 37°. Si te dio otro resultado, revisa que dividiste opuesto entre hipotenusa antes de aplicar sin⁻¹." },
    ] },
  { n: 10, hip: "25", op: "15", adj: "20", tipo: "cos", ladoUsadoLabel: "adyacente", valorUsado: "20",
    pasos: [
      { enunciado: "Mira el triángulo. ¿Cuáles dos lados ya tienen número (los conocemos)?",
        opciones: ["La hipotenusa y el opuesto (el lado de enfrente)", "La hipotenusa y el adyacente (el lado pegado al ángulo)", "El opuesto y el adyacente (los dos catetos, sin la hipotenusa)"], correcta: 1,
        explicacion: "Para hallar θ usamos la hipotenusa (25) y el adyacente (20), porque son los dos lados que conocemos en este triángulo." },
      { enunciado: "¿Qué botón de la calculadora usamos para hallar el ángulo?",
        opciones: ["sin⁻¹ (se usa cuando ya sabemos el opuesto y la hipotenusa)", "cos⁻¹ (se usa cuando ya sabemos el adyacente y la hipotenusa)", "tan⁻¹ (se usa cuando ya sabemos el opuesto y el adyacente)"], correcta: 1,
        explicacion: "Como conocemos la hipotenusa y el adyacente, la razón que relaciona esos dos lados es el coseno, así que usamos su inversa: cos⁻¹." },
      { enunciado: "¿Cuánto mide el ángulo θ?",
        formula: ["La razón coseno relaciona el adyacente con la hipotenusa: cos θ = adyacente ÷ hipotenusa.", "Para hallar el ángulo, aplicamos la función inversa: θ = cos⁻¹(adyacente ÷ hipotenusa).", "Con adyacente = 20 e hipotenusa = 25: θ = cos⁻¹(20 ÷ 25) = cos⁻¹(0.8) ≈"],
        opciones: ["53°", "37°", "60°"], correcta: 1,
        explicacion: "θ = cos⁻¹(20÷25) = cos⁻¹(0.8) ≈ 37°. Si te dio otro resultado, revisa que dividiste adyacente entre hipotenusa antes de aplicar cos⁻¹." },
    ] },
];

// Ayuda contextual del nivel Especial, según el paso (0: identificar lados, 1: elegir función inversa, 2: calcular)
const AYUDA_PASO = [
  "Busca en el triángulo los dos lados que tienen número: pueden ser el opuesto (frente al ángulo), el adyacente (pegado al ángulo) o la hipotenusa (el lado más largo, el más inclinado).",
  "Cada pareja de lados usa un botón distinto: opuesto + hipotenusa → sin⁻¹ · adyacente + hipotenusa → cos⁻¹ · opuesto + adyacente → tan⁻¹.",
  "Divide los dos números que conoces, ese resultado lo metes dentro del botón que elegiste, y la calculadora te da el ángulo en grados (verifica que esté en modo DEG).",
];

const CURSOS = ["1001", "1002", "1003", "1101", "1102", "1103"];

const NIVELES = [
  { id: "Fácil", desc: "15 preguntas · Valores exactos de 30°, 45° y 60°, y uso básico de la calculadora", preguntas: PREGUNTAS_FACIL },
  { id: "Intermedio", desc: "15 preguntas · Aplicar valores exactos y usar funciones inversas en la calculadora", preguntas: PREGUNTAS_INTERMEDIO },
  { id: "Avanzado", desc: "15 preguntas · Identidades, límites de las funciones inversas y contexto real", preguntas: PREGUNTAS_AVANZADO },
  { id: "Especial (NEE)", desc: "10 problemas guiados paso a paso · Ideal si necesitas más apoyo", preguntas: null },
];

// ---------- App ----------

function App() {
  const [fase, setFase] = useState("registro");
  const [nombre, setNombre] = useState("");
  const [curso, setCurso] = useState("");
  const [nivel, setNivel] = useState(null);
  const [idx, setIdx] = useState(0);
  const [respuestas, setRespuestas] = useState([]);
  const [enviado, setEnviado] = useState(false);

  // Estado del modo guiado (Especial)
  const [probIdx, setProbIdx] = useState(0);
  const [pasoIdx, setPasoIdx] = useState(0);
  const [respGuiado, setRespGuiado] = useState(
    PROBLEMAS_ESPECIAL.map(() => [null, null, null])
  );

  const esGuiado = nivel === "Especial (NEE)";
  const PREGUNTAS = esGuiado ? null : (NIVELES.find((nv) => nv.id === nivel) || {}).preguntas;
  const total = esGuiado ? PROBLEMAS_ESPECIAL.length : (PREGUNTAS ? PREGUNTAS.length : 0);
  const contestadas = esGuiado ? 0 : respuestas.filter((r) => r !== null).length;

  const resultado = useMemo(() => {
    if (esGuiado) {
      let correctas = 0;
      respGuiado.forEach((pasos, i) => {
        const prob = PROBLEMAS_ESPECIAL[i];
        const ok = pasos.every((r, j) => r === prob.pasos[j].correcta);
        if (ok) correctas++;
      });
      return { correctas, pct: Math.round((correctas / PROBLEMAS_ESPECIAL.length) * 100), incorrectas: PROBLEMAS_ESPECIAL.length - correctas };
    }
    if (!PREGUNTAS) return { correctas: 0, pct: 0, incorrectas: 0 };
    let correctas = 0;
    respuestas.forEach((r, i) => { if (r === PREGUNTAS[i].correcta) correctas++; });
    return { correctas, pct: Math.round((correctas / total) * 100), incorrectas: total - correctas };
  }, [respuestas, respGuiado, total, esGuiado, PREGUNTAS]);

  const elegir = (op) => {
    const nuevo = [...respuestas];
    nuevo[idx] = op;
    setRespuestas(nuevo);
  };

  const elegirGuiado = (op) => {
    const nuevo = respGuiado.map((p) => [...p]);
    nuevo[probIdx][pasoIdx] = op;
    setRespGuiado(nuevo);
  };

  const iniciar = () => { if (nombre.trim() && curso.trim()) setFase("nivel"); };

  const elegirNivel = (nv) => {
    setNivel(nv.id);
    if (nv.id === "Especial (NEE)") {
      setProbIdx(0);
      setPasoIdx(0);
      setRespGuiado(PROBLEMAS_ESPECIAL.map(() => [null, null, null]));
      setFase("guiado");
    } else {
      setRespuestas(Array(nv.preguntas.length).fill(null));
      setIdx(0);
      setFase("examen");
    }
  };

  const enviarSheets = () => {
    let pArr = [];
    if (esGuiado) {
      for (let i = 0; i < PROBLEMAS_ESPECIAL.length; i++) {
        const prob = PROBLEMAS_ESPECIAL[i];
        const ok = respGuiado[i].every((r, j) => r === prob.pasos[j].correcta);
        pArr.push(ok ? "✓" : "✗");
      }
    } else {
      pArr = PREGUNTAS.map((q, i) => {
        if (respuestas[i] === null) return "-";
        return respuestas[i] === q.correcta ? "✓" : "✗";
      });
    }
    while (pArr.length < MAX_COLUMNAS) pArr.push("-");

    const url =
      SCRIPT_URL +
      "?asignatura=" + encodeURIComponent(ASIGNATURA) +
      "&nombre=" + encodeURIComponent(nombre) +
      "&curso=" + encodeURIComponent(curso) +
      "&nivel=" + encodeURIComponent(nivel) +
      "&correctas=" + resultado.correctas +
      "&incorrectas=" + resultado.incorrectas +
      "&porcentaje=" + resultado.pct +
      "&fecha=" + encodeURIComponent(new Date().toLocaleString("es-CO")) +
      pArr.map((v, i) => "&p" + (i + 1) + "=" + encodeURIComponent(v)).join("");
    window.open(url, "_blank");
    setEnviado(true);
  };

  const ff = "'Segoe UI', system-ui, -apple-system, sans-serif";

  // ---- Registro ----
  if (fase === "registro") {
    const listo = nombre.trim() && curso.trim();
    return (
      <div style={{ ...wrap, fontFamily: ff }}>
        <div style={{ ...card, maxWidth: 460, margin: "0 auto", padding: 0, overflow: "hidden" }}>
          <div style={{ background: C.ink, color: "#fff", padding: "28px 30px", textAlign: "center" }}>
            <img src={LOGO_PROFE_ROYERO} alt="El Profe Royero" style={{ width: 76, height: 76, borderRadius: "50%", border: `2px solid ${C.amber}`, marginBottom: 12 }} />
            <div style={{ fontSize: 12, letterSpacing: 3, color: C.amber, fontWeight: 700 }}>SIMULADOR · GEOMETRÍA</div>
            <h1 style={{ margin: "6px 0 2px", fontSize: 26, fontWeight: 800, lineHeight: 1.15 }}>Ángulos Especiales</h1>
            <div style={{ fontSize: 14, opacity: 0.85 }}>Valores exactos y uso de la calculadora</div>
            <div style={{ fontSize: 11.5, opacity: 0.6, marginTop: 14 }}>I.E. Técnica Agropecuaria de Luruaco</div>
          </div>
          <div style={{ padding: 30 }}>
            <label style={lbl}>Nombre del estudiante</label>
            <input style={inp} value={nombre} onChange={(e) => setNombre(e.target.value)} placeholder="Nombres y apellidos" />
            <label style={lbl}>Curso</label>
            <select style={inp} value={curso} onChange={(e) => setCurso(e.target.value)}>
              <option value="">Selecciona tu curso</option>
              {CURSOS.map((c) => (
                <option key={c} value={c}>{c}</option>
              ))}
            </select>
            <button onClick={iniciar} disabled={!listo}
              style={{ ...btn, width: "100%", marginTop: 22, opacity: listo ? 1 : 0.45, cursor: listo ? "pointer" : "not-allowed" }}>
              Continuar
            </button>
            <p style={{ fontSize: 12, color: C.muted, marginTop: 16, lineHeight: 1.5 }}>
              En el siguiente paso eliges el nivel que quieres practicar.
            </p>
          </div>
        </div>
      </div>
    );
  }

  // ---- Selección de nivel ----
  if (fase === "nivel") {
    return (
      <div style={{ ...wrap, fontFamily: ff }}>
        <div style={{ ...card, maxWidth: 560, margin: "0 auto" }}>
          <div style={{ fontSize: 12, letterSpacing: 2, color: C.amber, fontWeight: 700 }}>PASO 2</div>
          <h2 style={{ margin: "4px 0 4px", color: C.ink, fontSize: 22 }}>Elige tu nivel</h2>
          <p style={{ color: C.muted, fontSize: 13, marginTop: 0, marginBottom: 20 }}>{nombre} · Curso {curso}</p>
          <div style={{ display: "grid", gap: 12 }}>
            {NIVELES.map((nv) => (
              <button key={nv.id} onClick={() => elegirNivel(nv)}
                style={{ textAlign: "left", background: "#fff", border: `1.5px solid ${C.line}`, borderRadius: 14,
                  padding: "16px 18px", cursor: "pointer" }}>
                <div style={{ fontWeight: 800, color: C.ink, fontSize: 16 }}>{nv.id}</div>
                <div style={{ color: C.muted, fontSize: 13, marginTop: 4 }}>{nv.desc}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  }

  // ---- Resultados ----
  if (fase === "resultados") {
    const r = resultado.pct;
    const radio = 70;
    const circ = 2 * Math.PI * radio;
    const color = r >= 70 ? C.good : r >= 40 ? C.amber : C.bad;
    return (
      <div style={{ ...wrap, fontFamily: ff }}>
        <div style={{ ...card, maxWidth: 720, margin: "0 auto" }}>
          <div style={{ textAlign: "center", paddingBottom: 8 }}>
            <div style={{ fontSize: 12, letterSpacing: 2, color: C.amber, fontWeight: 700 }}>RESULTADOS</div>
            <h2 style={{ margin: "4px 0 0", color: C.ink, fontSize: 22 }}>{nombre}</h2>
            <div style={{ color: C.muted, fontSize: 13 }}>Curso {curso} · Nivel {nivel}</div>
          </div>

          <div style={{ display: "flex", justifyContent: "center", margin: "10px 0 4px" }}>
            <svg width="180" height="180" viewBox="0 0 180 180">
              <circle cx="90" cy="90" r={radio} fill="none" stroke={C.line} strokeWidth="16" />
              <circle cx="90" cy="90" r={radio} fill="none" stroke={color} strokeWidth="16" strokeLinecap="round"
                strokeDasharray={circ} strokeDashoffset={circ - (r / 100) * circ} transform="rotate(-90 90 90)" />
              <text x="90" y="86" textAnchor="middle" fontSize="40" fontWeight="800" fill={C.ink}>{r}%</text>
              <text x="90" y="110" textAnchor="middle" fontSize="13" fill={C.muted}>{resultado.correctas} / {total}</text>
            </svg>
          </div>

          <div style={{ display: "flex", gap: 12, justifyContent: "center", marginBottom: 18 }}>
            <Pill label="Correctas" value={resultado.correctas} color={C.good} />
            <Pill label="Incorrectas" value={resultado.incorrectas} color={C.bad} />
          </div>

          <div style={{ display: "flex", gap: 10, justifyContent: "center", flexWrap: "wrap" }}>
            <button onClick={enviarSheets} style={{ ...btn }}>
              {enviado ? "Registrar de nuevo" : "Registrar resultado en Google Sheets"}
            </button>
            {!esGuiado && (
              <button onClick={() => { setFase("examen"); setIdx(0); }} style={{ ...btnGhost }}>Revisar respuestas</button>
            )}
          </div>
          {enviado && (
            <p style={{ textAlign: "center", color: C.good, fontSize: 12.5, marginTop: 12 }}>
              Se abrió una pestaña para enviar los datos. Si no se registró, verifica que la URL del script esté
              desplegada como aplicación web (termina en /exec).
            </p>
          )}

          <hr style={{ border: "none", borderTop: `1px solid ${C.line}`, margin: "22px 0 6px" }} />
          <h3 style={{ color: C.ink, fontSize: 16, margin: "8px 0 12px" }}>{esGuiado ? "Resumen por problema" : "Revisión"}</h3>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {esGuiado
              ? PROBLEMAS_ESPECIAL.map((p, i) => {
                  const ok = respGuiado[i].every((r, j) => r === p.pasos[j].correcta);
                  const sinResponder = respGuiado[i].every((r) => r === null);
                  return (
                    <div key={i} title={`Problema ${p.n}`}
                      style={{ width: 38, height: 38, borderRadius: 9, display: "flex", alignItems: "center", justifyContent: "center",
                        fontWeight: 700, color: "#fff", background: sinResponder ? C.muted : ok ? C.good : C.bad }}>
                      {p.n}
                    </div>
                  );
                })
              : PREGUNTAS.map((q, i) => {
                  const ok = respuestas[i] === q.correcta;
                  const sin = respuestas[i] === null;
                  return (
                    <button key={i} onClick={() => { setFase("examen"); setIdx(i); }} title={`Pregunta ${q.n}`}
                      style={{ width: 38, height: 38, borderRadius: 9, border: "none", cursor: "pointer",
                        fontWeight: 700, color: "#fff", background: sin ? C.muted : ok ? C.good : C.bad }}>
                      {q.n}
                    </button>
                  );
                })}
          </div>
        </div>
      </div>
    );
  }

  // ---- Examen guiado (Especial · NEE) ----
  if (fase === "guiado") {
    const prob = PROBLEMAS_ESPECIAL[probIdx];
    const paso = prob.pasos[pasoIdx];
    const seleccion = respGuiado[probIdx][pasoIdx];
    const respondido = seleccion !== null;
    const esUltimoPaso = pasoIdx === 2;
    const esUltimoProblema = probIdx === PROBLEMAS_ESPECIAL.length - 1;

    const siguiente = () => {
      if (!esUltimoPaso) { setPasoIdx(pasoIdx + 1); return; }
      if (!esUltimoProblema) { setProbIdx(probIdx + 1); setPasoIdx(0); return; }
      setFase("resultados");
    };

    return (
      <div style={{ ...wrap, fontFamily: ff }}>
        <div style={{ ...card, maxWidth: 640, margin: "0 auto" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
            <div style={{ fontWeight: 800, color: C.ink, fontSize: 15 }}>Nivel Especial · Aprendizaje guiado</div>
            <div style={{ fontSize: 13, color: C.muted }}>Problema {probIdx + 1} / {PROBLEMAS_ESPECIAL.length}</div>
          </div>
          <div style={{ height: 8, background: C.line, borderRadius: 99, margin: "10px 0 4px" }}>
            <div style={{ width: `${((probIdx + pasoIdx / 3 + 1 / 3) / PROBLEMAS_ESPECIAL.length) * 100}%`, height: "100%", background: C.amber, borderRadius: 99, transition: "width .25s" }} />
          </div>
          <div style={{ fontSize: 11.5, color: C.muted, marginBottom: 12 }}>Paso {pasoIdx + 1} de 3</div>

          <div style={{ background: "#eef4f2", border: `1px solid ${C.line}`, borderRadius: 10, padding: "10px 12px", fontSize: 12.5, color: C.inkSoft, marginBottom: 10 }}>
            <strong>Datos de este triángulo:</strong> hipotenusa = {prob.hip}, {prob.tipo === "sin" ? `opuesto = ${prob.op}` : `adyacente = ${prob.adj}`}.
            El ángulo θ (marcado con ?) es el que debes encontrar.
          </div>

          <div style={{ background: "#fdf2e3", border: `1px solid ${C.amber}`, borderRadius: 10, padding: "8px 12px", fontSize: 12.5, color: C.inkSoft, marginBottom: 14 }}>
            💡 {AYUDA_PASO[pasoIdx]}
          </div>

          <div style={{ margin: "6px 0 14px", padding: 12, background: C.paper, borderRadius: 12, display: "flex", justifyContent: "center" }}>
            <Triangulo orient="A" adj={prob.tipo === "cos" ? prob.adj : ""} op={prob.tipo === "sin" ? prob.op : ""} hip={prob.hip} angleLabel="?" />
          </div>

          <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
            <span style={{ background: C.ink, color: "#fff", borderRadius: 8, padding: "3px 10px", fontWeight: 700, fontSize: 13, height: "fit-content" }}>{pasoIdx + 1}</span>
            <p style={{ margin: 0, color: C.inkSoft, fontSize: 15.5, lineHeight: 1.55, fontWeight: 700 }}>{paso.enunciado}</p>
          </div>

          {paso.formula && (
            <div style={{ background: "#eef2fb", border: `1px solid #c7d3ef`, borderRadius: 10, padding: "12px 14px", marginBottom: 16, fontSize: 13.5, color: C.inkSoft, lineHeight: 1.6 }}>
              {paso.formula.map((linea, i) => <div key={i} style={{ marginTop: i === 0 ? 0 : 4 }}>{linea}</div>)}
            </div>
          )}

          <div style={{ display: "grid", gap: 10 }}>
            {paso.opciones.map((op, i) => {
              const letra = ["A", "B", "C"][i];
              const elegida = seleccion === i;
              const esCorrecta = i === paso.correcta;
              let bg = C.card, bd = C.line;
              if (respondido) {
                if (esCorrecta) { bg = "#eaf6ef"; bd = C.good; }
                else if (elegida) { bg = "#fbece9"; bd = C.bad; }
              }
              return (
                <button key={i} onClick={() => !respondido && elegirGuiado(i)}
                  style={{ textAlign: "left", display: "flex", gap: 12, alignItems: "flex-start", padding: "12px 14px",
                    borderRadius: 12, border: `2px solid ${bd}`, background: bg, cursor: respondido ? "default" : "pointer",
                    fontSize: 14.5, color: C.inkSoft }}>
                  <span style={{ fontWeight: 800, color: elegida || (respondido && esCorrecta) ? C.ink : C.muted, minWidth: 16 }}>{letra}</span>
                  <span style={{ flex: 1 }}>{op}</span>
                  {respondido && esCorrecta && <span style={{ color: C.good, fontWeight: 800 }}>✓</span>}
                  {respondido && elegida && !esCorrecta && <span style={{ color: C.bad, fontWeight: 800 }}>✗</span>}
                </button>
              );
            })}
          </div>

          {respondido && (
            <div style={{ marginTop: 14 }}>
              <p style={{ fontSize: 13, color: seleccion === paso.correcta ? C.good : C.bad, fontWeight: 700, margin: "0 0 6px" }}>
                {seleccion === paso.correcta ? "¡Muy bien! Es correcto." : "No es correcto."}
              </p>
              {paso.explicacion && (
                <div style={{ background: "#eef2fb", border: `1px solid #c7d3ef`, borderRadius: 10, padding: "10px 14px", fontSize: 13.5, color: C.inkSoft, lineHeight: 1.55 }}>
                  {paso.explicacion}
                </div>
              )}
            </div>
          )}

          <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 18 }}>
            <button onClick={siguiente} disabled={!respondido}
              style={{ ...btn, opacity: respondido ? 1 : 0.45, cursor: respondido ? "pointer" : "not-allowed" }}>
              {esUltimoPaso && esUltimoProblema ? "Finalizar y ver resultados" : esUltimoPaso ? "Siguiente problema →" : "Siguiente paso →"}
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ---- Examen (Fácil / Intermedio / Avanzado) ----
  const p = PREGUNTAS[idx];
  const seleccion = respuestas[idx];
  const contestada = seleccion !== null;
  return (
    <div style={{ ...wrap, fontFamily: ff }}>
      <div style={{ ...card, maxWidth: 760, margin: "0 auto" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline" }}>
          <div style={{ fontWeight: 800, color: C.ink, fontSize: 15 }}>Ángulos Especiales · Nivel {nivel}</div>
          <div style={{ fontSize: 13, color: C.muted }}>{idx + 1} <span style={{ opacity: 0.6 }}>/ {total}</span></div>
        </div>
        <div style={{ height: 8, background: C.line, borderRadius: 99, margin: "10px 0 4px" }}>
          <div style={{ width: `${((idx + 1) / total) * 100}%`, height: "100%", background: C.amber, borderRadius: 99, transition: "width .25s" }} />
        </div>
        <div style={{ fontSize: 11.5, color: C.muted, marginBottom: 18 }}>{contestadas} de {total} respondidas</div>

        <div style={{ display: "flex", gap: 10, marginBottom: 6 }}>
          <span style={{ background: C.ink, color: "#fff", borderRadius: 8, padding: "3px 10px", fontWeight: 700, fontSize: 13, height: "fit-content" }}>{p.n}</span>
          <p style={{ margin: 0, color: C.inkSoft, fontSize: 15.5, lineHeight: 1.55 }}>{p.enunciado}</p>
        </div>

        {p.figura && (
          <div style={{ margin: "14px 0", padding: 12, background: C.paper, borderRadius: 12, display: "flex", justifyContent: "center" }}>
            {p.figura}
          </div>
        )}

        <div style={{ display: "grid", gap: 10, marginTop: 12 }}>
          {p.opciones.map((op, i) => {
            const letra = ["A", "B", "C", "D"][i];
            const elegida = seleccion === i;
            const esCorrecta = i === p.correcta;
            let bg = C.card, bd = C.line;
            if (contestada) {
              if (esCorrecta) { bg = "#eaf6ef"; bd = C.good; }
              else if (elegida) { bg = "#fbece9"; bd = C.bad; }
            }
            return (
              <button key={i} onClick={() => !contestada && elegir(i)}
                style={{ textAlign: "left", display: "flex", gap: 12, alignItems: "flex-start", padding: "12px 14px",
                  borderRadius: 12, border: `2px solid ${bd}`, background: bg, cursor: contestada ? "default" : "pointer",
                  fontSize: 14.5, color: C.inkSoft }}>
                <span style={{ fontWeight: 800, color: elegida || (contestada && esCorrecta) ? C.ink : C.muted, minWidth: 16 }}>{letra}</span>
                <span style={{ flex: 1 }}>{op}</span>
                {contestada && esCorrecta && <span style={{ color: C.good, fontWeight: 800 }}>✓</span>}
                {contestada && elegida && !esCorrecta && <span style={{ color: C.bad, fontWeight: 800 }}>✗</span>}
              </button>
            );
          })}
        </div>

        {contestada && (
          <div style={{ marginTop: 14 }}>
            <p style={{ fontSize: 13, color: seleccion === p.correcta ? C.good : C.bad, fontWeight: 700, margin: "0 0 6px" }}>
              {seleccion === p.correcta ? "¡Correcto!" : "No es correcto."}
            </p>
            {p.explicacion && (
              <div style={{ background: "#eef2fb", border: `1px solid #c7d3ef`, borderRadius: 10, padding: "10px 14px", fontSize: 13.5, color: C.inkSoft, lineHeight: 1.55 }}>
                {p.explicacion}
              </div>
            )}
          </div>
        )}

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 24, gap: 10 }}>
          <button onClick={() => setIdx((v) => Math.max(0, v - 1))} disabled={idx === 0} style={{ ...btnGhost, opacity: idx === 0 ? 0.4 : 1 }}>← Anterior</button>
          {idx < total - 1 ? (
            <button onClick={() => setIdx((v) => Math.min(total - 1, v + 1))} style={{ ...btn }}>Siguiente →</button>
          ) : (
            <button onClick={() => setFase("resultados")} style={{ ...btn, background: C.good }}>Finalizar y ver resultados</button>
          )}
        </div>

        <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginTop: 20 }}>
          {PREGUNTAS.map((q, i) => (
            <button key={i} onClick={() => setIdx(i)}
              style={{ width: 30, height: 30, borderRadius: 7, fontSize: 12, fontWeight: 700, cursor: "pointer",
                border: i === idx ? `2px solid ${C.ink}` : `1px solid ${C.line}`,
                background: respuestas[i] !== null ? C.amber : C.card,
                color: respuestas[i] !== null ? "#fff" : C.muted }}>
              {q.n}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function Pill({ label, value, color }) {
  return (
    <div style={{ background: "#fff", border: `1px solid ${C.line}`, borderRadius: 12, padding: "10px 18px", textAlign: "center", minWidth: 92 }}>
      <div style={{ fontSize: 24, fontWeight: 800, color }}>{value}</div>
      <div style={{ fontSize: 11.5, color: C.muted }}>{label}</div>
    </div>
  );
}

const wrap = { minHeight: "100vh", background: C.paper, padding: "28px 16px", boxSizing: "border-box" };
const card = { background: C.card, borderRadius: 18, padding: 26, boxShadow: "0 8px 30px rgba(15,42,63,.08)", border: `1px solid ${C.line}` };
const lbl = { display: "block", fontSize: 12.5, fontWeight: 700, color: C.ink, margin: "14px 0 6px" };
const inp = { width: "100%", padding: "11px 13px", borderRadius: 10, border: `1.5px solid ${C.line}`, fontSize: 15, boxSizing: "border-box", outline: "none" };
const btn = { background: C.ink, color: "#fff", border: "none", borderRadius: 10, padding: "11px 20px", fontSize: 14.5, fontWeight: 700, cursor: "pointer" };
const btnGhost = { background: "#fff", color: C.ink, border: `1.5px solid ${C.line}`, borderRadius: 10, padding: "11px 20px", fontSize: 14.5, fontWeight: 700, cursor: "pointer" };

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
